<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Studio85 Producciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
<style>
  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    background: #0A0A0A;
    font-family: 'Inter', sans-serif;
    color: #ffffff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #0A0A0A;
    padding: 24px 20px 18px;
    text-align: center;
    border-bottom: 1px solid #2a2a2a;
  }

  header h1 {
    font-family: 'Bebas Neue', sans-serif;
    text-transform: uppercase;
    letter-spacing: 3px;
    font-size: 32px;
    margin: 0;
    color: #d4a017;
  }

  header p {
    margin: 6px 0 0;
    font-size: 14px;
    color: #cfcfcf;
    font-weight: 500;
  }

  main {
    flex: 1;
    display: flex;
    justify-content: center;
    padding: 24px 16px;
  }

  .chat-card {
    width: 100%;
    max-width: 640px;
    background: #141414;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    display: flex;
    flex-direction: column;
    height: 78vh;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.5;
    word-wrap: break-word;
  }

  .bubble p {
    margin: 0 0 8px;
  }

  .bubble p:last-child {
    margin-bottom: 0;
  }

  .bubble.user {
    align-self: flex-end;
    background: #d4a017;
    color: #ffffff;
    border-bottom-right-radius: 4px;
  }

  .bubble.bot {
    align-self: flex-start;
    background: #1f1f1f;
    border: 1px solid #2a2a2a;
    color: #ffffff;
    border-bottom-left-radius: 4px;
  }

  .bubble.typing {
    display: flex;
    gap: 4px;
    align-items: center;
    padding: 14px 16px;
  }

  .bubble.typing span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #9a9a9a;
    animation: blink 1.2s infinite ease-in-out;
  }

  .bubble.typing span:nth-child(2) {
    animation-delay: 0.2s;
  }

  .bubble.typing span:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; }
    40% { opacity: 1; }
  }

  form {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-top: 1px solid #2a2a2a;
    background: #141414;
  }

  textarea {
    flex: 1;
    resize: none;
    background: #1f1f1f;
    border: 1px solid #2a2a2a;
    border-radius: 10px;
    color: #ffffff;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 12px 14px;
    outline: none;
    max-height: 120px;
  }

  textarea::placeholder {
    color: #7a7a7a;
  }

  textarea:focus {
    border-color: #d4a017;
  }

  button {
    background: #d4a017;
    color: #000000;
    border: none;
    border-radius: 10px;
    padding: 0 22px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: opacity 0.15s ease;
  }

  button:hover {
    opacity: 0.88;
  }

  button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .messages::-webkit-scrollbar {
    width: 8px;
  }

  .messages::-webkit-scrollbar-thumb {
    background: #2a2a2a;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <header>
    <h1>Studio85 Producciones</h1>
    <p>&iquest;En que te ayudo?</p>
  </header>

  <main>
    <div class="chat-card">
      <div class="messages" id="messages"></div>
      <form id="chat-form">
        <textarea id="input" rows="1" placeholder="Escribe tu mensaje..." required></textarea>
        <button type="submit" id="send-btn">Enviar</button>
      </form>
    </div>
  </main>

  <script>
    const messagesEl = document.getElementById('messages');
    const formEl = document.getElementById('chat-form');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');

    const historial = [];

    function addBubble(role, text) {
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot');
      bubble.innerHTML = window.marked ? marked.parse(text) : text;
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    function addTypingBubble() {
      const bubble = document.createElement('div');
      bubble.className = 'bubble bot typing';
      bubble.innerHTML = '<span></span><span></span><span></span>';
      messagesEl.appendChild(bubble);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    addBubble('assistant', 'Hola, bienvenido a Studio85 Producciones. Ayudamos con video de bodas en Granada y toda Andalucia Oriental. Cuentame en que puedo ayudarte');

    formEl.addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = inputEl.value.trim();
      if (!text) return;

      addBubble('user', text);
      historial.push({ role: 'user', content: text });
      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      const typingBubble = addTypingBubble();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ historial })
        });
        const data = await res.json();
        typingBubble.remove();

        if (data.respuesta) {
          addBubble('assistant', data.respuesta);
          historial.push({ role: 'assistant', content: data.respuesta });
        } else {
          addBubble('assistant', 'Lo siento, ha ocurrido un error. Intentalo de nuevo o contacta con nosotros al 625 72 79 18.');
        }
      } catch (err) {
        typingBubble.remove();
        addBubble('assistant', 'Lo siento, ha ocurrido un error de conexion. Intentalo de nuevo.');
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        formEl.requestSubmit();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
